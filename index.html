<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎵 共享音樂播放器 | 雲端歌單</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a1a 0%, #2d2618 100%); min-height: 100vh; color: #fff; }
        .login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(135deg, #1a1a1a 0%, #2d2618 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .login-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; }
        .login-title { text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 30px; color: #fff; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #ddd; }
        .input-group input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: #1db954; }
        .login-btn { width: 100%; padding: 14px; border-radius: 30px; border: none; background: #1db954; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background: #1ed760; }
        .error-msg { color: #ff4444; text-align: center; margin-top: 15px; font-size: 14px; display: none; }
        .main-container { display: none; min-height: 100vh; padding: 20px; padding-bottom: 100px; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; border-radius: 20px 20px 0 0; border: none; background: rgba(255, 255, 255, 0.1); color: #ddd; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: rgba(29, 185, 84, 0.2); color: #1db954; font-weight: bold; }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .song-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-height: 55vh; overflow-y: auto; }
        .song-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); cursor: pointer; transition: background 0.3s; }
        .song-item:hover { background: rgba(255, 255, 255, 0.1); }
        .song-cover { width: 50px; height: 50px; border-radius: 8px; background: linear-gradient(135deg, #666 0%, #888 100%); display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .song-info { flex: 1; }
        .song-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: #fff; word-break: break-word; }
        .song-uploader { font-size: 11px; color: #1db954; margin-top: 2px; }
        .like-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: transparent; color: #aaa; font-size: 18px; cursor: pointer; transition: all 0.3s; }
        .like-btn.active { color: #1db954; }
        .upload-area { border: 2px dashed rgba(29, 185, 84, 0.5); border-radius: 15px; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; background: rgba(0,0,0,0.2); transition: all 0.3s; }
        .upload-area:hover { border-color: #1db954; background: rgba(29, 185, 84, 0.1); }
        .upload-icon { font-size: 40px; color: #1db954; margin-bottom: 10px; }
        .upload-text { font-size: 16px; color: #ddd; }
        .upload-sub { font-size: 12px; color: #aaa; margin-top: 8px; }
        #file-input { display: none; }
        .sync-status { text-align: center; font-size: 12px; padding: 8px; color: #ffaa44; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .sync-status:hover { background: rgba(0,0,0,0.5); }
        .delete-song-btn { background: transparent; border: none; color: #ff6b6b; font-size: 18px; cursor: pointer; padding: 5px 8px; border-radius: 20px; transition: all 0.3s; }
        .delete-song-btn:hover { background: rgba(255,0,0,0.2); }
        .share-info { background: rgba(29,185,84,0.1); border-radius: 10px; padding: 10px; margin-bottom: 15px; text-align: center; font-size: 12px; border: 1px solid rgba(29,185,84,0.3); }
        .share-info code { background: #333; padding: 4px 8px; border-radius: 6px; font-family: monospace; word-break: break-all; }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(135deg, #2d2618 0%, #1a1a1a 100%); padding: 15px 20px; display: flex; align-items: center; gap: 15px; z-index: 999; }
        .player-cover { width: 56px; height: 56px; border-radius: 8px; background: linear-gradient(135deg, #666 0%, #888 100%); display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .player-info { flex: 1; min-width: 0; }
        .player-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 12px; color: #aaa; }
        .player-controls { display: flex; align-items: center; gap: 20px; }
        .control-btn { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; transition: color 0.3s; }
        .control-btn.play-pause { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; font-size: 24px; display: flex; justify-content: center; align-items: center; }
        .control-btn:hover { color: #1db954; }
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); cursor: pointer; }
        .progress-bar { height: 100%; background: #1db954; width: 0%; transition: width 0.1s linear; }
        .time-display { position: absolute; top: -20px; font-size: 12px; color: #aaa; }
        .time-current { left: 15px; }
        .time-total { right: 15px; }
        @media (max-width: 768px) { .tab-btn { padding: 8px 16px; font-size: 13px; } .player-controls { gap: 12px; } .control-btn.play-pause { width: 45px; height: 45px; font-size: 20px; } }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        .now-playing { background: rgba(29, 185, 84, 0.2); border-left: 3px solid #1db954; }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2 class="login-title">🎵 共享音樂播放器</h2>
            <div class="input-group"><label>帳號</label><input type="text" id="username" placeholder="請輸入帳號"></div>
            <div class="input-group"><label>密碼</label><input type="password" id="password" placeholder="請輸入密碼"></div>
            <button class="login-btn" id="loginBtn">登入</button>
            <div class="error-msg" id="errorMsg">帳號或密碼錯誤</div>
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="share-info">
            🔗 共享連結：<code id="shareLink">載入中...</code> 
            <button id="copyLinkBtn" style="background:#1db954; border:none; border-radius:5px; padding:2px 10px; margin-left:5px; cursor:pointer;">複製</button>
        </div>
        <div class="tab-container">
            <button class="tab-btn active" data-tab="my-songs">🎵 我的歌單</button>
            <button class="tab-btn" data-tab="liked-songs">❤️ 已按讚歌曲</button>
            <button class="tab-btn" data-tab="history">📜 播放記錄</button>
        </div>

        <div class="tab-content active" id="my-songs">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">☁️📁</div>
                <div class="upload-text">點擊或拖曳 MP3 上傳（所有人共享）</div>
                <div class="upload-sub">檔案儲存在 JSONBin 雲端，所有使用者都能看到</div>
                <input type="file" id="file-input" accept="audio/mp3,audio/mpeg" multiple>
            </div>
            <div class="sync-status" id="syncStatus">
                🔄 正在連接雲端...
            </div>
            <div class="song-list" id="mySongList"></div>
        </div>

        <div class="tab-content" id="liked-songs">
            <div class="song-list" id="likedSongList"></div>
        </div>

        <div class="tab-content" id="history">
            <div class="song-list" id="historyList"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="time-display time-current" id="timeCurrent">0:00</div>
            <div class="time-display time-total" id="timeTotal">0:00</div>
        </div>
        <div class="player-cover" id="playerCover">🎵</div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">未播放任何歌曲</div>
            <div class="player-artist" id="playerArtist">共享音樂</div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="shuffleBtn">🔀</button>
            <button class="control-btn" id="prevBtn">⏮️</button>
            <button class="control-btn play-pause" id="playPauseBtn">⏸️</button>
            <button class="control-btn" id="nextBtn">⏭️</button>
            <button class="control-btn" id="timerBtn">⏱️</button>
        </div>
    </div>
    <audio id="audioPlayer"></audio>

    <script>
        // 登入驗證
        const VALID_USERNAME = 'lin0525';
        const VALID_PASSWORD = 'aa340993';
        
        const loginContainer = document.getElementById('loginContainer');
        const mainContainer = document.getElementById('mainContainer');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        
        let currentUser = '';
        
        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                currentUser = username;
                loginContainer.style.opacity = '0';
                setTimeout(() => {
                    loginContainer.style.display = 'none';
                    mainContainer.style.display = 'block';
                    initApp();
                }, 500);
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        });
        
        // ========== JSONBin 設定（已填入您的資訊）==========
        // 重要：請確保這個 Bin 在 JSONBin 網站上設定為「Public」！
        const BIN_ID = '69d40f9136566621a8857adc';
        const API_KEY = '$2a$10$LgENCJUgvqemHVawKUJUDOejhMSb0ANqkkdbNMBNaTmq0HAn4jtxi';
        
        let songList = [];
        let likedSongs = [];
        let playHistory = [];
        let currentSongIndex = -1;
        let isShuffle = false;
        
        // DOM 元素
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeTotal = document.getElementById('timeTotal');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const playerCover = document.getElementById('playerCover');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const timerBtn = document.getElementById('timerBtn');
        const mySongListDiv = document.getElementById('mySongList');
        const likedSongListDiv = document.getElementById('likedSongList');
        const historyListDiv = document.getElementById('historyList');
        const syncStatus = document.getElementById('syncStatus');
        const copyLinkBtn = document.getElementById('copyLinkBtn');
        const shareLinkSpan = document.getElementById('shareLink');
        
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        function formatSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }
        
        function base64ToBlob(base64) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            return new Blob([new Uint8Array(byteNumbers)], { type: 'audio/mp3' });
        }
        
        // 初始化 Bin（如果不存在則創建）
        async function initBin() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                if (response.status === 404) {
                    // Bin 不存在，創建一個新的
                    const createResponse = await fetch('https://api.jsonbin.io/v3/b', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': API_KEY
                        },
                        body: JSON.stringify({ songs: [], lastUpdated: new Date().toISOString() })
                    });
                    const data = await createResponse.json();
                    if (data.metadata && data.metadata.id) {
                        console.log('已創建新 Bin，ID:', data.metadata.id);
                        return true;
                    }
                }
                return response.ok;
            } catch (error) {
                console.error('初始化 Bin 失敗:', error);
                return false;
            }
        }
        
        // 從雲端載入
        async function loadSongsFromCloud() {
            syncStatus.innerHTML = "☁️ 正在從雲端載入歌曲...";
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const record = data.record;
                
                if (record && record.songs && Array.isArray(record.songs)) {
                    songList = record.songs;
                    for (let song of songList) {
                        if (song.blobData) {
                            const blob = base64ToBlob(song.blobData);
                            song.blob = blob;
                            song.url = URL.createObjectURL(blob);
                        }
                    }
                    syncStatus.innerHTML = `✅ 已載入 ${songList.length} 首共享歌曲 (點擊重新整理)`;
                } else {
                    songList = [];
                    syncStatus.innerHTML = `✅ 雲端暫無歌曲！點擊上方區域上傳第一首 MP3 🎵`;
                }
                
                renderSongList();
                
                const storageKey = `music_${currentUser}`;
                const userData = JSON.parse(localStorage.getItem(storageKey) || '{"liked":[],"history":[]}');
                likedSongs = userData.liked || [];
                playHistory = userData.history || [];
                renderLikedSongs();
                renderHistory();
                
                return songList;
            } catch (error) {
                console.error('載入失敗:', error);
                syncStatus.innerHTML = `⚠️ 載入失敗：${error.message}<br>點擊這裡重試`;
                return [];
            }
        }
        
        // 儲存到雲端
        async function saveSongsToCloud() {
            syncStatus.innerHTML = "📤 同步到雲端...";
            try {
                const songsToSave = [];
                for (const song of songList) {
                    let blobData = song.blobData;
                    if (!blobData && song.blob) {
                        blobData = await blobToBase64(song.blob);
                    }
                    songsToSave.push({
                        id: song.id,
                        name: song.name,
                        blobData: blobData,
                        size: song.size,
                        uploader: song.uploader,
                        date: song.date
                    });
                }
                
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY,
                        'X-Bin-Versioning': 'false'
                    },
                    body: JSON.stringify({ 
                        songs: songsToSave, 
                        lastUpdated: new Date().toISOString(),
                        totalSongs: songsToSave.length
                    })
                });
                
                if (response.ok) {
                    syncStatus.innerHTML = `✅ 已同步 ${songList.length} 首歌曲到雲端 (點擊重新整理)`;
                    return true;
                } else {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
            } catch (error) {
                console.error('同步失敗:', error);
                syncStatus.innerHTML = `⚠️ 同步失敗：${error.message}<br>點擊這裡重試`;
                return false;
            }
        }
        
        // 點擊狀態列可重新整理
        syncStatus.addEventListener('click', () => {
            loadSongsFromCloud();
        });
        
        // 上傳 MP3
        async function uploadMP3(file) {
            if (!file.type.includes('audio/mp3') && !file.name.endsWith('.mp3')) {
                alert('請上傳 MP3 檔案');
                return;
            }
            
            syncStatus.innerHTML = `📤 上傳 ${file.name} 到雲端...`;
            
            const songId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            const blob = file.slice(0, file.size, file.type);
            const url = URL.createObjectURL(blob);
            const blobData = await blobToBase64(blob);
            
            const song = {
                id: songId,
                name: file.name.replace(/\.mp3$/i, ''),
                blob: blob,
                blobData: blobData,
                url: url,
                size: file.size,
                uploader: currentUser,
                date: new Date().toISOString()
            };
            
            songList.push(song);
            renderSongList();
            const success = await saveSongsToCloud();
            
            if (success && songList.length === 1 && currentSongIndex === -1) {
                playSong(0);
            }
        }
        
        // 播放歌曲
        function playSong(index) {
            if (index < 0 || index >= songList.length) return;
            const song = songList[index];
            if (!song.url && song.blob) {
                song.url = URL.createObjectURL(song.blob);
            }
            if (!song.url) return;
            
            currentSongIndex = index;
            audioPlayer.src = song.url;
            audioPlayer.play().catch(e => console.log('播放需要使用者互動'));
            playPauseBtn.textContent = '⏸️';
            playerTitle.textContent = song.name;
            playerArtist.textContent = `上傳者：${song.uploader || '未知'}`;
            
            renderSongList();
            
            const historyItem = { id: song.id, name: song.name, time: new Date().toLocaleString('zh-TW') };
            playHistory = [historyItem, ...playHistory.filter(h => h.id !== song.id)].slice(0, 50);
            localStorage.setItem(`music_${currentUser}`, JSON.stringify({ liked: likedSongs, history: playHistory }));
            renderHistory();
        }
        
        function playNext() {
            if (songList.length === 0) return;
            let newIndex = isShuffle ? Math.floor(Math.random() * songList.length) : (currentSongIndex + 1) % songList.length;
            playSong(newIndex);
        }
        
        function playPrev() {
            if (songList.length === 0) return;
            let newIndex = isShuffle ? Math.floor(Math.random() * songList.length) : (currentSongIndex - 1 + songList.length) % songList.length;
            playSong(newIndex);
        }
        
        // 刪除歌曲（只能刪自己上傳的）
        async function deleteSong(song, idx) {
            if (song.uploader !== currentUser) {
                alert('只能刪除自己上傳的歌曲');
                return;
            }
            if (!confirm(`確定刪除「${song.name}」嗎？`)) return;
            
            if (song.url) URL.revokeObjectURL(song.url);
            songList.splice(idx, 1);
            
            if (currentSongIndex === idx) {
                if (songList.length > 0) playSong(Math.min(idx, songList.length - 1));
                else { audioPlayer.pause(); audioPlayer.src = ''; playerTitle.textContent = '未播放任何歌曲'; currentSongIndex = -1; }
            } else if (currentSongIndex > idx) {
                currentSongIndex--;
            }
            
            renderSongList();
            await saveSongsToCloud();
        }
        
        // 按讚
        function toggleLike(songId) {
            if (likedSongs.includes(songId)) {
                likedSongs = likedSongs.filter(id => id !== songId);
            } else {
                likedSongs.push(songId);
            }
            localStorage.setItem(`music_${currentUser}`, JSON.stringify({ liked: likedSongs, history: playHistory }));
            renderSongList();
            renderLikedSongs();
        }
        
        function renderSongList() {
            mySongListDiv.innerHTML = '';
            if (songList.length === 0) {
                mySongListDiv.innerHTML = '<div class="empty-state">🎧 還沒有歌曲，快上傳 MP3 和大家分享吧！</div>';
                return;
            }
            
            songList.forEach((song, idx) => {
                const isLiked = likedSongs.includes(song.id);
                const isNowPlaying = (currentSongIndex === idx);
                const isOwner = (song.uploader === currentUser);
                const div = document.createElement('div');
                div.className = `song-item ${isNowPlaying ? 'now-playing' : ''}`;
                div.innerHTML = `
                    <div class="song-cover">${isNowPlaying ? '▶️' : '🎵'}</div>
                    <div class="song-info">
                        <div class="song-name">${escapeHtml(song.name)}</div>
                        <div class="song-uploader">📤 ${escapeHtml(song.uploader || '未知')} | ${formatSize(song.size)}</div>
                    </div>
                    <button class="like-btn ${isLiked ? 'active' : ''}" data-id="${song.id}">❤️</button>
                    ${isOwner ? `<button class="delete-song-btn" data-id="${song.id}">🗑️</button>` : ''}
                `;
                const likeBtn = div.querySelector('.like-btn');
                likeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(song.id); });
                if (isOwner) {
                    const delBtn = div.querySelector('.delete-song-btn');
                    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteSong(song, idx); });
                }
                div.addEventListener('click', () => playSong(idx));
                mySongListDiv.appendChild(div);
            });
        }
        
        function renderLikedSongs() {
            likedSongListDiv.innerHTML = '';
            const likedSongsList = songList.filter(s => likedSongs.includes(s.id));
            if (likedSongsList.length === 0) {
                likedSongListDiv.innerHTML = '<div class="empty-state">❤️ 暫無已按讚歌曲</div>';
                return;
            }
            likedSongsList.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div class="song-cover">❤️</div>
                    <div class="song-info"><div class="song-name">${escapeHtml(song.name)}</div><div class="song-uploader">📤 ${escapeHtml(song.uploader || '未知')}</div></div>
                    <button class="like-btn active">❤️</button>
                `;
                const likeBtn = div.querySelector('.like-btn');
                likeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(song.id); });
                div.addEventListener('click', () => { const idx = songList.findIndex(s => s.id === song.id); if (idx !== -1) playSong(idx); });
                likedSongListDiv.appendChild(div);
            });
        }
        
        function renderHistory() {
            historyListDiv.innerHTML = '';
            if (playHistory.length === 0) {
                historyListDiv.innerHTML = '<div class="empty-state">📭 尚無播放記錄</div>';
                return;
            }
            playHistory.slice(0, 30).forEach(item => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div class="song-cover">📜</div><div class="song-info"><div class="song-name">${escapeHtml(item.name)}</div><div class="song-duration">${item.time}</div></div>`;
                div.addEventListener('click', () => { const idx = songList.findIndex(s => s.id === item.id); if (idx !== -1) playSong(idx); });
                historyListDiv.appendChild(div);
            });
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        // 播放器事件
        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const total = audioPlayer.duration;
            if (total && isFinite(total) && total > 0) {
                progressBar.style.width = `${(current / total) * 100}%`;
                timeCurrent.textContent = formatTime(current);
                timeTotal.textContent = formatTime(total);
            }
        });
        
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percentage = (e.clientX - rect.left) / rect.width;
            if (audioPlayer.duration && isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = percentage * audioPlayer.duration;
            }
        });
        
        playPauseBtn.addEventListener('click', () => {
            if (songList.length === 0) { alert('請先上傳或等待載入歌曲'); return; }
            if (audioPlayer.paused) {
                if (!audioPlayer.src || currentSongIndex === -1) playSong(0);
                else { audioPlayer.play(); playPauseBtn.textContent = '⏸️'; }
            } else { audioPlayer.pause(); playPauseBtn.textContent = '▶️'; }
        });
        
        shuffleBtn.addEventListener('click', () => { isShuffle = !isShuffle; shuffleBtn.style.color = isShuffle ? '#1db954' : '#fff'; });
        timerBtn.addEventListener('click', () => { const m = prompt('定時關閉(分鐘):', '30'); if(m && !isNaN(m)) { setTimeout(() => { audioPlayer.pause(); playPauseBtn.textContent = '▶️'; alert('已自動關閉'); }, m*60*1000); alert(`設定 ${m} 分鐘後關閉`); } });
        nextBtn.addEventListener('click', () => playNext());
        prevBtn.addEventListener('click', () => playPrev());
        audioPlayer.addEventListener('ended', () => playNext());
        
        // 上傳區域
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('file-input');
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = 'rgba(29,185,84,0.2)'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'transparent'; });
        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.style.background = 'transparent';
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.includes('audio') || f.name.endsWith('.mp3'));
            for (const f of files) await uploadMP3(f);
        });
        fileInput.addEventListener('change', async (e) => { const files = Array.from(e.target.files); for (const f of files) await uploadMP3(f); fileInput.value = ''; });
        
        // 分頁切換
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(target).classList.add('active');
                if (target === 'history') renderHistory();
                if (target === 'liked-songs') renderLikedSongs();
            });
        });
        
        // 共享連結
        copyLinkBtn.addEventListener('click', () => {
            const url = window.location.href;
            navigator.clipboard.writeText(url);
            alert('✅ 連結已複製！分享給朋友，他們登入後就能看到同一份歌單！');
        });
        shareLinkSpan.textContent = window.location.href;
        
        // 初始化
        async function initApp() {
            await initBin();
            await loadSongsFromCloud();
        }
    </script>
</body>
</html>
