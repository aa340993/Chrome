<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌷 粉粉音樂盒 </title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', 'SF Pro Text', sans-serif; }
        
        :root {
            --bg-gradient-start: #1a0b14;
            --bg-gradient-end: #2d1a24;
            --card-bg: rgba(45, 25, 35, 0.85);
            --border-color: rgba(255,105,180,0.3);
            --text-primary: #ffe4ec;
            --text-secondary: #ff99bb;
            --accent: #ff69b4;
            --accent-dark: #ff1493;
            --accent-glow: rgba(255,105,180,0.3);
            --input-bg: rgba(0,0,0,0.3);
            --player-bg: rgba(30, 15, 22, 0.95);
        }
        
        body.light-mode {
            --bg-gradient-start: #fff0f5;
            --bg-gradient-end: #ffe4ec;
            --card-bg: rgba(255, 240, 245, 0.9);
            --border-color: rgba(255,105,180,0.2);
            --text-primary: #5c2e4a;
            --text-secondary: #b56576;
            --accent: #ff69b4;
            --accent-dark: #e75480;
            --input-bg: rgba(0,0,0,0.05);
            --player-bg: rgba(255, 240, 245, 0.95);
        }
        
        body.dark-mode {
            --bg-gradient-start: #0a0510;
            --bg-gradient-end: #1a0f18;
            --card-bg: rgba(20, 10, 18, 0.9);
            --border-color: rgba(255,105,180,0.2);
            --text-primary: #ffc0d0;
            --text-secondary: #ff80a0;
            --accent: #ff4080;
            --accent-dark: #ff1493;
            --input-bg: rgba(255,255,255,0.05);
            --player-bg: rgba(10, 5, 15, 0.95);
        }
        
        body { background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); min-height: 100vh; color: var(--text-primary); transition: background 0.3s, color 0.3s; }
        
        .login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(145deg, #1a0b14 0%, #2d1a24 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .login-box { background: var(--card-bg); backdrop-filter: blur(16px); padding: 42px 36px; border-radius: 48px; width: 90%; max-width: 400px; box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 0 1px var(--border-color); border: 1px solid var(--border-color); }
        .login-title { text-align: center; font-size: 30px; font-weight: 800; margin-bottom: 32px; background: linear-gradient(135deg, #ffb6c1, #ff69b4, #ff1493); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .input-group input { width: 100%; padding: 14px 18px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 15px; outline: none; }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .login-btn { width: 100%; padding: 14px; border-radius: 40px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
        .login-btn:hover { transform: scale(1.02); box-shadow: 0 8px 25px var(--accent-glow); }
        .guest-btn { background: transparent; border: 1px solid var(--accent); margin-top: 12px; }
        .guest-btn:hover { background: rgba(255,105,180,0.2); }
        .error-msg { color: #ff6b6b; text-align: center; margin-top: 15px; font-size: 13px; display: none; }
        
        .main-container { display: none; min-height: 100vh; padding: 20px 16px 110px; max-width: 700px; margin: 0 auto; }
        
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 40px; padding: 6px 12px; display: flex; gap: 6px; backdrop-filter: blur(4px); }
        .theme-btn { background: transparent; border: none; font-size: 16px; cursor: pointer; padding: 5px 10px; border-radius: 30px; color: var(--text-secondary); transition: all 0.2s; }
        .theme-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; }
        .search-box { flex: 1; max-width: 200px; }
        .search-box input { width: 100%; padding: 8px 14px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 12px; outline: none; }
        .playlist-btn, .logout-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 40px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text-primary); backdrop-filter: blur(4px); }
        .logout-btn { background: rgba(255,107,107,0.2); border-color: #ff6b6b; }
        
        .app-header { text-align: center; margin-bottom: 16px; }
        .app-header h1 { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #ffb6c1, #ff69b4, #ff1493); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .app-header p { font-size: 11px; color: var(--text-secondary); opacity: 0.8; }
        
        .tab-container { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card-bg); padding: 6px; border-radius: 60px; backdrop-filter: blur(8px); border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 10px 8px; border-radius: 40px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
        
        .tab-content { display: none; animation: fadeIn 0.25s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        
        .song-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-height: 50vh; overflow-y: auto; padding-right: 4px; }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-track { background: var(--accent-glow); border-radius: 4px; }
        .song-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        
        .song-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 20px; background: var(--card-bg); backdrop-filter: blur(2px); cursor: pointer; transition: all 0.25s; border: 1px solid var(--border-color); }
        .song-item:hover { transform: translateX(3px); border-color: var(--accent); }
        .song-item.now-playing { background: linear-gradient(135deg, rgba(255,105,180,0.15), rgba(255,20,147,0.08)); border-left: 3px solid var(--accent); }
        
        .song-cover-img { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; background: linear-gradient(145deg, var(--accent), var(--accent-dark)); display: flex; justify-content: center; align-items: center; font-size: 22px; }
        .song-info { flex: 1; min-width: 0; }
        .song-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .song-uploader { font-size: 10px; color: var(--text-secondary); }
        .action-btns { display: flex; gap: 5px; align-items: center; }
        .edit-name-btn, .like-btn, .delete-song-btn, .add-to-playlist-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: rgba(255,105,180,0.1); color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .edit-name-btn:hover, .like-btn:hover, .delete-song-btn:hover, .add-to-playlist-btn:hover { background: rgba(255,105,180,0.3); transform: scale(1.05); }
        .like-btn.active { color: #ff4080; background: rgba(255,64,128,0.2); }
        .delete-song-btn { color: #ff6b6b; }
        
        .upload-area { border: 2px dashed var(--accent); border-radius: 28px; padding: 24px 16px; text-align: center; margin-bottom: 20px; cursor: pointer; background: rgba(255,105,180,0.05); transition: all 0.25s; }
        .upload-area:hover { background: rgba(255,105,180,0.12); transform: scale(0.98); }
        .upload-icon { font-size: 40px; margin-bottom: 8px; }
        .upload-text { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
        .upload-sub { font-size: 10px; color: var(--text-secondary); opacity: 0.7; margin-top: 6px; }
        #file-input, #cover-input { display: none; }
        
        .sync-status { text-align: center; font-size: 11px; padding: 10px; color: var(--text-secondary); background: var(--card-bg); border-radius: 60px; margin-bottom: 16px; cursor: pointer; backdrop-filter: blur(4px); border: 1px solid var(--border-color); }
        
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--player-bg); backdrop-filter: blur(20px); padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 999; border-top: 1px solid var(--border-color); }
        .player-cover { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; background: linear-gradient(145deg, var(--accent), var(--accent-dark)); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .player-info { flex: 1; min-width: 0; }
        .player-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
        .player-controls { display: flex; align-items: center; gap: 6px; }
        .control-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; transition: all 0.2s; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .control-btn:hover { background: var(--accent-glow); color: var(--accent); transform: scale(1.05); }
        .control-btn.play-pause { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; font-size: 20px; width: 50px; height: 50px; box-shadow: 0 4px 12px var(--accent-glow); }
        .progress-container { position: absolute; top: -3px; left: 0; width: 100%; height: 3px; background: var(--accent-glow); cursor: pointer; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); width: 0%; transition: width 0.1s linear; border-radius: 2px; }
        .time-display { position: absolute; top: -16px; font-size: 9px; color: var(--text-secondary); font-weight: 600; }
        .time-current { left: 10px; }
        .time-total { right: 10px; }
        
        .playlist-panel { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: var(--card-bg); backdrop-filter: blur(20px); z-index: 10001; transition: right 0.3s ease; padding: 20px; border-left: 1px solid var(--border-color); overflow-y: auto; }
        .playlist-panel.open { right: 0; }
        .playlist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .playlist-header h3 { color: var(--accent); }
        .close-panel { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        .playlist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 8px; border-radius: 16px; background: rgba(255,105,180,0.05); cursor: pointer; }
        .playlist-item:hover { background: rgba(255,105,180,0.15); }
        .playlist-name { flex: 1; }
        .delete-playlist { background: transparent; border: none; color: #ff6b6b; cursor: pointer; font-size: 14px; }
        .add-playlist { margin-top: 16px; display: flex; gap: 8px; }
        .add-playlist input { flex: 1; padding: 10px; border-radius: 30px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); }
        .add-playlist button { padding: 10px 16px; border-radius: 30px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; cursor: pointer; }
        
        .settings-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .settings-modal-content { background: var(--card-bg); padding: 24px; border-radius: 32px; width: 85%; max-width: 340px; border: 1px solid var(--border-color); }
        .settings-modal-content h3 { color: var(--accent); margin-bottom: 20px; text-align: center; }
        .setting-item { margin-bottom: 20px; }
        .setting-item label { color: var(--text-secondary); font-size: 13px; display: block; margin-bottom: 8px; }
        .setting-item input[type="range"] { width: 100%; }
        .mode-buttons { display: flex; gap: 8px; margin-top: 8px; }
        .mode-btn { flex: 1; padding: 8px; border-radius: 30px; border: none; background: rgba(255,105,180,0.2); color: var(--text-secondary); cursor: pointer; font-size: 12px; }
        .mode-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; }
        .speed-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .speed-btn-small { padding: 6px 12px; border-radius: 30px; border: none; background: rgba(255,105,180,0.2); color: var(--text-secondary); cursor: pointer; font-size: 12px; }
        .speed-btn-small.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; }
        .close-settings { width: 100%; padding: 12px; border-radius: 40px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; cursor: pointer; margin-top: 16px; }
        
        .empty-state { text-align: center; padding: 40px 16px; color: var(--text-secondary); opacity: 0.6; font-size: 13px; background: var(--card-bg); border-radius: 28px; }
        
        @media (max-width: 550px) { .main-container { padding: 16px 12px 100px; } .player-controls { gap: 3px; } .control-btn { width: 34px; height: 34px; font-size: 16px; } .control-btn.play-pause { width: 46px; height: 46px; } .song-item { padding: 10px; } .song-cover-img { width: 42px; height: 42px; } }
    </style>
</head>
<body>

    <script>
        // ========== 登入驗證 ==========
        const VALID_USERS = { 'lin0525': 'aa340993', 'ccy1103': 'aa340993' };
        
        const loginContainer = document.getElementById('loginContainer');
        const mainContainer = document.getElementById('mainContainer');
        const loginBtn = document.getElementById('loginBtn');
        const guestBtn = document.getElementById('guestBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const welcomeMsg = document.getElementById('welcomeMsg');
        
        let currentUser = '';
        let isGuest = false;
        
        function doLogin(username, isGuestMode = false) {
            currentUser = username;
            isGuest = isGuestMode;
            loginContainer.style.opacity = '0';
            setTimeout(() => {
                loginContainer.style.display = 'none';
                mainContainer.style.display = 'block';
                if (isGuestMode) {
                    welcomeMsg.innerHTML = '🌷 訪客模式 · 僅限瀏覽 🌷';
                } else {
                    welcomeMsg.innerHTML = `🎀 歡迎回來，${username} 🎀`;
                }
                initApp();
            }, 500);
        }
        
        function saveLoginState(username, isGuestMode) {
            if (!isGuestMode) {
                localStorage.setItem('savedLogin', JSON.stringify({ username, isGuest: false }));
            }
        }
        
        function logout() {
            localStorage.removeItem('savedLogin');
            location.reload();
        }
        
        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (VALID_USERS[username] && VALID_USERS[username] === password) {
                saveLoginState(username, false);
                doLogin(username, false);
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        });

            const guestName = '訪客_' + Math.random().toString(36).substr(2, 6);
            doLogin(guestName, true);
        });
        
        logoutBtn.addEventListener('click', logout);
        
        const savedLogin = localStorage.getItem('savedLogin');

            try {

                if (username && VALID_USERS[username]) {
                    doLogin(username, false);
                }
            } catch(e) {}
        }

            document.body.classList.remove('light-mode', 'dark-mode');
            if (theme === 'light') document.body.classList.add('light-mode');
            if (theme === 'dark') document.body.classList.add('dark-mode');
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => {
                if (btn.dataset.theme === theme) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => setTheme(btn.dataset.theme));
        });
        
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value.toLowerCase();
            renderSongList();
        });
        
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        function formatSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }
        
        function base64ToBlob(base64, type) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            return new Blob([new Uint8Array(byteNumbers)], { type: type || 'audio/mp3' });
        }
        
        function getNextSongIndex() {
            if (songList.length === 0) return -1;
            if (playMode === 'loop') return currentSongIndex;
            if (playMode === 'shuffle') {
                let newIndex = Math.floor(Math.random() * songList.length);
                while (newIndex === currentSongIndex && songList.length > 1) {
                    newIndex = Math.floor(Math.random() * songList.length);
                }
                return newIndex;
            }
            return (currentSongIndex + 1) % songList.length;
        }
        
        function playNext() {
            if (songList.length === 0) return;
            const newIndex = getNextSongIndex();
            if (newIndex !== -1) playSong(newIndex);
        }
        
        async function loadSongsFromCloud() {
            syncStatus.innerHTML = "🌷 粉粉同步中...";
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/songs?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                if (!response.ok) {
                    if (response.status === 404) {
                        syncStatus.innerHTML = "📦 請先在 Supabase 執行 SQL 建立資料表 (點擊複製)";
                        syncStatus.onclick = () => {
                            const sql = `CREATE TABLE songs (id TEXT PRIMARY KEY, name TEXT NOT NULL, blob_data TEXT NOT NULL, cover_data TEXT, size INTEGER, uploader TEXT, date TIMESTAMP);
ALTER TABLE songs ENABLE ROW LEVEL SECURITY;
CREATE POLICY "允許所有人" ON songs FOR ALL USING (true);`;
                            navigator.clipboard.writeText(sql);
                            alert('SQL 已複製！請到 Supabase → SQL Editor 貼上執行');
                        };
                        return [];
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data && Array.isArray(data)) {
                    songList = data;
                    for (let song of songList) {
                        if (song.blob_data) {
                            try {
                                const blob = base64ToBlob(song.blob_data, 'audio/mp3');
                                song.blob = blob;
                                song.url = URL.createObjectURL(blob);
                            } catch(e) { console.warn('解析失敗:', song.name); }
                        }
                        if (song.cover_data) {
                            song.coverUrl = `data:image/jpeg;base64,${song.cover_data}`;
                        }
                    }
                    syncStatus.innerHTML = `💖 ${songList.length} 首歌曲已同步 (點擊重新整理)`;
                    syncStatus.onclick = () => loadSongsFromCloud();
                } else {
                    songList = [];
                    syncStatus.innerHTML = `✨ 暫無歌曲，上傳第一首 MP3 吧`;
                }
                
                const playlistsData = localStorage.getItem(`playlists_${currentUser}`);
                if (playlistsData) playlists = JSON.parse(playlistsData);
                else playlists = { '預設歌單': [] };
                renderPlaylistList();
                
                renderSongList();
                
                const storageKey = `music_${currentUser}`;
                const userData = JSON.parse(localStorage.getItem(storageKey) || '{"liked":[],"history":[],"lastSong":null}');
                likedSongs = userData.liked || [];
                playHistory = userData.history || [];
                
                if (userData.lastSong && userData.lastSong.songId && !isGuest) {
                    const lastIndex = songList.findIndex(s => s.id === userData.lastSong.songId);
                    if (lastIndex !== -1) {
                        currentSongIndex = lastIndex;
                        const song = songList[lastIndex];
                        if (!song.url && song.blob) song.url = URL.createObjectURL(song.blob);
                        audioPlayer.src = song.url;
                        playerTitle.textContent = song.name;
                        playerArtist.textContent = `🎀 ${song.uploader || '未知'} 分享`;
                        if (song.coverUrl) { playerCover.src = song.coverUrl; playerCover.style.display = 'block'; playerCoverIcon.style.display = 'none'; }
                        audioPlayer.currentTime = userData.lastSong.currentTime || 0;
                    }
                }
                
                renderLikedSongs();
                renderHistory();
                
                return songList;
            } catch (error) {
                console.error('載入失敗:', error);
                syncStatus.innerHTML = `⚠️ 連線失敗：${error.message}<br>點擊重試`;
                syncStatus.onclick = () => loadSongsFromCloud();
                return [];
            }
        }
        
        function saveLastPlayState() {
            if (isGuest) return;
            const storageKey = `music_${currentUser}`;
            const userData = JSON.parse(localStorage.getItem(storageKey) || '{"liked":[],"history":[]}');
            userData.lastSong = {
                songId: songList[currentSongIndex]?.id,
                currentTime: audioPlayer.currentTime
            };
            localStorage.setItem(storageKey, JSON.stringify(userData));
        }
        
        async function saveSongsToCloud(song) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/songs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        id: song.id,
                        name: song.name,
                        blob_data: song.blobData,
                        cover_data: song.coverData || null,
                        size: song.size,
                        uploader: song.uploader,
                        date: song.date
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
                }
                return true;
            } catch (error) {
                console.error('上傳失敗:', error);
                throw error;
            }
        }
        
        async function updateSongNameInCloud(songId, newName) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${songId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    body: JSON.stringify({ name: newName })
                });
                return response.ok;
            } catch (error) { return false; }
        }
        
        async function deleteSongFromCloud(songId) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${songId}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                return response.ok;
            } catch (error) { return false; }
        }
        
        function editSongName(song, idx) {
            if (isGuest) { alert('訪客模式無法編輯'); return; }
            if (song.uploader !== currentUser) { alert('只能修改自己的歌曲'); return; }
            const newName = prompt('輸入新歌名:', song.name);
            if (!newName || newName === song.name) return;
            updateSongNameInCloud(song.id, newName).then(success => {
                if (success) {
                    song.name = newName;
                    renderSongList();
                    if (currentSongIndex === idx) playerTitle.textContent = newName;
                } else alert('更新失敗');
            });
        }
        
        let pendingCover = null;
        document.getElementById('cover-input').addEventListener('change', (e) => {
            if (e.target.files.length > 0) pendingCover = e.target.files[0];
        });
        
        async function uploadMP3(file) {
            if (isGuest) { alert('訪客模式無法上傳'); return; }
            if (!file.type.includes('audio/mp3') && !file.name.endsWith('.mp3')) {
                alert('請上傳 MP3 檔案');
                return;
            }
            if (file.size > 10 * 1024 * 1024) { alert('檔案需小於 10MB'); return; }
            
            const originalStatus = syncStatus.innerHTML;
            syncStatus.innerHTML = `📤 上傳 ${file.name} 中...`;
            
            try {
                const songId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                const blob = file.slice(0, file.size, file.type);
                const url = URL.createObjectURL(blob);
                const blobData = await blobToBase64(blob);
                
                let coverData = null;
                if (pendingCover) {
                    coverData = await blobToBase64(pendingCover);
                    pendingCover = null;
                    document.getElementById('cover-input').value = '';
                }
                
                const song = {
                    id: songId,
                    name: file.name.replace(/\.mp3$/i, ''),
                    blob: blob,
                    blobData: blobData,
                    coverData: coverData,
                    url: url,
                    size: file.size,
                    uploader: currentUser,
                    date: new Date().toISOString()
                };
                
                await saveSongsToCloud(song);
                
                songList.push(song);
                renderSongList();
                if (songList.length === 1 && currentSongIndex === -1) playSong(0);
                syncStatus.innerHTML = `✅ 上傳成功！共 ${songList.length} 首歌曲 (點擊重新整理)`;
                syncStatus.onclick = () => loadSongsFromCloud();
                setTimeout(() => {
                    if (syncStatus.innerHTML.includes('上傳成功')) {
                        syncStatus.innerHTML = `💖 ${songList.length} 首歌曲已同步`;
                    }
                }, 3000);
                
            } catch (error) {
                console.error('上傳錯誤:', error);
                syncStatus.innerHTML = `⚠️ 上傳失敗：${error.message}<br>點擊重試`;
                syncStatus.onclick = () => uploadMP3(file);
                setTimeout(() => {
                    if (syncStatus.innerHTML.includes('上傳失敗')) {
                        syncStatus.innerHTML = originalStatus;
                    }
                }, 5000);
            }
        }
        
        function playSong(index) {
            if (index < 0 || index >= songList.length) return;
            const song = songList[index];
            if (!song.url && song.blob) song.url = URL.createObjectURL(song.blob);
            if (!song.url) return;
            
            currentSongIndex = index;
            audioPlayer.src = song.url;
            audioPlayer.playbackRate = currentSpeed;
            audioPlayer.volume = currentVolume;
            audioPlayer.play().catch(e => console.log('需要互動'));
            playPauseBtn.innerHTML = '⏸️';
            playerTitle.textContent = song.name;
            playerArtist.textContent = `🎀 ${song.uploader || '未知'} 分享`;
            if (song.coverUrl) {
                playerCover.src = song.coverUrl;
                playerCover.style.display = 'block';
                playerCoverIcon.style.display = 'none';
            } else {
                playerCover.style.display = 'none';
                playerCoverIcon.style.display = 'flex';
            }
            
            renderSongList();
            
            const historyItem = { id: song.id, name: song.name, time: new Date().toLocaleString('zh-TW') };
            playHistory = [historyItem, ...playHistory.filter(h => h.id !== song.id)].slice(0, 50);
            if (!isGuest) localStorage.setItem(`music_${currentUser}`, JSON.stringify({ liked: likedSongs, history: playHistory, lastSong: null }));
            renderHistory();
            saveLastPlayState();
        }
        
        async function deleteSong(song, idx) {
            if (isGuest) { alert('訪客模式無法刪除'); return; }
            if (song.uploader !== currentUser) { alert('只能刪除自己的歌曲'); return; }
            if (!confirm(`確定刪除「${song.name}」？`)) return;
            const success = await deleteSongFromCloud(song.id);
            if (success) {
                if (song.url) URL.revokeObjectURL(song.url);
                songList.splice(idx, 1);
                if (currentSongIndex === idx) {
                    if (songList.length > 0) playSong(Math.min(idx, songList.length - 1));
                    else { audioPlayer.pause(); audioPlayer.src = ''; playerTitle.textContent = '未播放'; currentSongIndex = -1; }
                } else if (currentSongIndex > idx) currentSongIndex--;
                renderSongList();
                syncStatus.innerHTML = `✅ 已刪除，共 ${songList.length} 首`;
            } else alert('刪除失敗');
        }
        
        function toggleLike(songId) {
            if (likedSongs.includes(songId)) likedSongs = likedSongs.filter(id => id !== songId);
            else likedSongs.push(songId);
            if (!isGuest) localStorage.setItem(`music_${currentUser}`, JSON.stringify({ liked: likedSongs, history: playHistory, lastSong: null }));
            renderSongList();
            renderLikedSongs();
        }
        
        function addToPlaylist(songId) {
            if (isGuest) { alert('訪客模式無法建立歌單'); return; }
            const playlistName = prompt('選擇或輸入歌單名稱', Object.keys(playlists)[0]);
            if (!playlistName) return;
            if (!playlists[playlistName]) playlists[playlistName] = [];
            if (!playlists[playlistName].includes(songId)) playlists[playlistName].push(songId);
            localStorage.setItem(`playlists_${currentUser}`, JSON.stringify(playlists));
            renderPlaylistList();
            alert(`已加入「${playlistName}」`);
        }
        
        function renderPlaylistList() {
            playlistListDiv.innerHTML = '';
            Object.entries(playlists).forEach(([name, songIds]) => {
                const div = document.createElement('div');
                div.className = 'playlist-item';
                div.innerHTML = `
                    <span class="playlist-name">📁 ${name} (${songIds.length})</span>
                    <button class="delete-playlist" data-name="${name}">🗑️</button>
                `;
                div.querySelector('.playlist-name').addEventListener('click', () => {
                    const songs = songList.filter(s => songIds.includes(s.id));
                    alert(`歌單「${name}」:\n${songs.map(s => s.name).join('\n') || '暫無歌曲'}`);
                });
                div.querySelector('.delete-playlist').addEventListener('click', (e) => {
                    e.stopPropagation();
                    delete playlists[name];
                    localStorage.setItem(`playlists_${currentUser}`, JSON.stringify(playlists));
                    renderPlaylistList();
                });
                playlistListDiv.appendChild(div);
            });
        }
        
        document.getElementById('createPlaylistBtn').addEventListener('click', () => {
            if (isGuest) { alert('訪客模式無法建立歌單'); return; }
            const name = document.getElementById('newPlaylistName').value.trim();
            if (name && !playlists[name]) {
                playlists[name] = [];
                localStorage.setItem(`playlists_${currentUser}`, JSON.stringify(playlists));
                renderPlaylistList();
                document.getElementById('newPlaylistName').value = '';
            }
        });
        
        document.getElementById('playlistBtn').addEventListener('click', () => {
            playlistPanel.classList.add('open');
        });
        document.getElementById('closePanelBtn').addEventListener('click', () => {
            playlistPanel.classList.remove('open');
        });
        
        function renderSongList() {
            let filteredSongs = songList;
            if (searchKeyword) {
                filteredSongs = songList.filter(s => s.name.toLowerCase().includes(searchKeyword));
            }
            mySongListDiv.innerHTML = '';
            if (filteredSongs.length === 0) {
                mySongListDiv.innerHTML = '<div class="empty-state">🌷 沒有符合的歌曲<br>試試其他關鍵字</div>';
                return;
            }
            
            filteredSongs.forEach((song, idx) => {
                const originalIdx = songList.findIndex(s => s.id === song.id);
                const isLiked = likedSongs.includes(song.id);
                const isNowPlaying = (currentSongIndex === originalIdx);
                const isOwner = (song.uploader === currentUser && !isGuest);
                const div = document.createElement('div');
                div.className = `song-item ${isNowPlaying ? 'now-playing' : ''}`;
                div.innerHTML = `
                    ${song.coverUrl ? `<img class="song-cover-img" src="${song.coverUrl}" onerror="this.style.display='none';this.outerHTML='<div class=\"song-cover-img\">🌷</div>'">` : `<div class="song-cover-img">🌷</div>`}
                    <div class="song-info">
                        <div class="song-name">${escapeHtml(song.name)}</div>
                        <div class="song-uploader">🎀 ${escapeHtml(song.uploader || '未知')} · ${formatSize(song.size)}</div>
                    </div>
                    <div class="action-btns">
                        <button class="add-to-playlist-btn" data-id="${song.id}">📋</button>
                        ${isOwner ? `<button class="edit-name-btn" data-id="${song.id}">✏️</button>` : ''}
                        <button class="like-btn ${isLiked ? 'active' : ''}" data-id="${song.id}">💖</button>
                        ${isOwner ? `<button class="delete-song-btn" data-id="${song.id}">🗑️</button>` : ''}
                    </div>
                `;
                div.querySelector('.add-to-playlist-btn')?.addEventListener('click', (e) => { e.stopPropagation(); addToPlaylist(song.id); });
                div.querySelector('.like-btn')?.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(song.id); });
                if (isOwner) {
                    div.querySelector('.edit-name-btn')?.addEventListener('click', (e) => { e.stopPropagation(); editSongName(song, originalIdx); });
                    div.querySelector('.delete-song-btn')?.addEventListener('click', (e) => { e.stopPropagation(); deleteSong(song, originalIdx); });
                }
                div.addEventListener('click', () => playSong(originalIdx));
                mySongListDiv.appendChild(div);
            });
        }
        
        function renderLikedSongs() {
            likedSongListDiv.innerHTML = '';
            const likedSongsList = songList.filter(s => likedSongs.includes(s.id));
            if (likedSongsList.length === 0) {
                likedSongListDiv.innerHTML = '<div class="empty-state">💖 還沒有喜愛歌曲<br>點擊歌曲旁的 💖 收藏</div>';
                return;
            }
            likedSongsList.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    ${song.coverUrl ? `<img class="song-cover-img" src="${song.coverUrl}">` : `<div class="song-cover-img">💖</div>`}
                    <div class="song-info"><div class="song-name">${escapeHtml(song.name)}</div><div class="song-uploader">🎀 ${escapeHtml(song.uploader || '未知')}</div></div>
                    <button class="like-btn active">💖</button>
                `;
                div.querySelector('.like-btn').addEventListener('click', (e) => { e.stopPropagation(); toggleLike(song.id); });
                div.addEventListener('click', () => { const idx = songList.findIndex(s => s.id === song.id); if (idx !== -1) playSong(idx); });
                likedSongListDiv.appendChild(div);
            });

        function renderHistory() {
            historyListDiv.innerHTML = '';
            if (playHistory.length === 0) {
                historyListDiv.innerHTML = '<div class="empty-state">📖 尚無播放記錄<br>播放歌曲後會顯示在這裡</div>';
                return;
            }
            playHistory.slice(0, 30).forEach(item => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div class="song-cover-img">📖</div><div class="song-info"><div class="song-name">${escapeHtml(item.name)}</div><div class="song-uploader">${item.time}</div></div>`;
                div.addEventListener('click', () => { const idx = songList.findIndex(s => s.id === item.id); if (idx !== -1) playSong(idx); });
                historyListDiv.appendChild(div);
            });
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        function openSettings() {
            const modal = document.createElement('div');
            modal.className = 'settings-modal';
            modal.innerHTML = `
                <div class="settings-modal-content">
                    <h3>⚙️ 播放設定</h3>
                    <div class="setting-item">
                        <label>🔊 音量</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="${currentVolume * 100}">

                    </div>

                        </div>
                    </div>
                    <button class="close-settings" id="closeSettingsBtn">關閉</button>
                </div>

            modal.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    playMode = btn.dataset.mode;
                    modal.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            modal.querySelectorAll('.speed-btn-small').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentSpeed = parseFloat(btn.dataset.speed);
                    audioPlayer.playbackRate = currentSpeed;
                    modal.querySelectorAll('.speed-btn-small').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            modal.querySelector('#closeSettingsBtn').onclick = () => modal.remove();

        settingsBtn.addEventListener('click', openSettings);
        prev15Btn.addEventListener('click', () => { audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 15); });
        next15Btn.addEventListener('click', () => { audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 15); });
        nextTrackBtn.addEventListener('click', () => playNext());
        
        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const total = audioPlayer.duration;
            if (total && isFinite(total) && total > 0) {
                progressBar.style.width = `${(current / total) * 100}%`;
                timeCurrent.textContent = formatTime(current);
                timeTotal.textContent = formatTime(total);
            }
            if (!isGuest) saveLastPlayState();
        });
        
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percentage = (e.clientX - rect.left) / rect.width;
            if (audioPlayer.duration && isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = percentage * audioPlayer.duration;
            }
        });
        
        playPauseBtn.addEventListener('click', () => {
            if (songList.length === 0) { alert('請先上傳歌曲'); return; }
            if (audioPlayer.paused) {
                if (!audioPlayer.src || currentSongIndex === -1) playSong(0);
                else { audioPlayer.play(); playPauseBtn.innerHTML = '⏸️'; }
            } else { audioPlayer.pause(); playPauseBtn.innerHTML = '▶️'; }
        });
        
        audioPlayer.addEventListener('ended', () => {
            if (playMode === 'loop') {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else {
                playNext();
            }
        });
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('file-input');
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = 'rgba(255,105,180,0.12)'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'transparent'; });
        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.style.background = 'transparent';
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.includes('audio') || f.name.endsWith('.mp3'));
            for (const f of files) await uploadMP3(f);
        });
        fileInput.addEventListener('change', async (e) => { const files = Array.from(e.target.files); for (const f of files) await uploadMP3(f); fileInput.value = ''; });
        
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(target).classList.add('active');
                if (target === 'history') renderHistory();
                if (target === 'liked-songs') renderLikedSongs();
            });
        });
        
        async function initApp() {
            const savedTheme = localStorage.getItem('theme') || 'pink';
            setTheme(savedTheme);
            await loadSongsFromCloud();
        }
    </script>
</body>
</html>
