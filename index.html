<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>音樂播放器 | 本地歌單</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a1a 0%, #2d2618 100%); min-height: 100vh; color: #fff; }
        .login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(135deg, #1a1a1a 0%, #2d2618 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .login-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .login-title { text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 30px; color: #fff; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #ddd; }
        .input-group input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: #1db954; }
        .login-btn { width: 100%; padding: 14px; border-radius: 30px; border: none; background: #1db954; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background: #1ed760; }
        .error-msg { color: #ff4444; text-align: center; margin-top: 15px; font-size: 14px; display: none; }
        .main-container { display: none; min-height: 100vh; padding: 20px; padding-bottom: 100px; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; border-radius: 20px 20px 0 0; border: none; background: rgba(255, 255, 255, 0.1); color: #ddd; font-size: 16px; cursor: pointer; }
        .tab-btn.active { background: rgba(29, 185, 84, 0.2); color: #1db954; font-weight: bold; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .song-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .song-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); cursor: pointer; transition: background 0.3s; }
        .song-item:hover { background: rgba(255, 255, 255, 0.1); }
        .song-cover { width: 50px; height: 50px; border-radius: 8px; background: linear-gradient(135deg, #666 0%, #888 100%); display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .song-info { flex: 1; }
        .song-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: #fff; word-break: break-word; }
        .song-duration { font-size: 12px; color: #aaa; }
        .song-size { font-size: 10px; color: #666; margin-top: 2px; }
        .like-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: transparent; color: #aaa; font-size: 18px; cursor: pointer; }
        .like-btn.active { color: #1db954; }
        .upload-area { border: 2px dashed rgba(29, 185, 84, 0.5); border-radius: 15px; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; background: rgba(0,0,0,0.2); transition: all 0.3s; }
        .upload-area:hover { border-color: #1db954; background: rgba(29, 185, 84, 0.1); }
        .upload-icon { font-size: 40px; color: #1db954; margin-bottom: 10px; }
        .upload-text { font-size: 16px; color: #ddd; }
        .upload-sub { font-size: 12px; color: #aaa; margin-top: 8px; }
        #file-input { display: none; }
        .storage-info { text-align: center; font-size: 12px; padding: 8px; color: #1db954; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 15px; }
        .delete-song-btn { background: transparent; border: none; color: #ff6b6b; font-size: 18px; cursor: pointer; padding: 5px 8px; border-radius: 20px; }
        .delete-song-btn:hover { background: rgba(255,0,0,0.2); }
        .clear-all-btn { background: rgba(255,100,100,0.2); border: 1px solid #ff6b6b; padding: 8px 16px; border-radius: 20px; color: #ff6b6b; cursor: pointer; margin-bottom: 15px; font-size: 12px; }
        .clear-all-btn:hover { background: rgba(255,100,100,0.4); }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(135deg, #2d2618 0%, #1a1a1a 100%); padding: 15px 20px; display: flex; align-items: center; gap: 15px; z-index: 999; }
        .player-cover { width: 56px; height: 56px; border-radius: 8px; background: linear-gradient(135deg, #666 0%, #888 100%); display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .player-info { flex: 1; min-width: 0; }
        .player-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 12px; color: #aaa; }
        .player-controls { display: flex; align-items: center; gap: 20px; }
        .control-btn { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .control-btn.play-pause { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; font-size: 24px; display: flex; justify-content: center; align-items: center; }
        .control-btn:hover { color: #1db954; }
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); cursor: pointer; }
        .progress-bar { height: 100%; background: #1db954; width: 0%; transition: width 0.1s linear; }
        .time-display { position: absolute; top: -20px; font-size: 12px; color: #aaa; }
        .time-current { left: 15px; }
        .time-total { right: 15px; }
        @media (max-width: 768px) { .tab-btn { padding: 8px 16px; font-size: 13px; } .player-controls { gap: 12px; } .control-btn.play-pause { width: 45px; height: 45px; font-size: 20px; } }
        .empty-state { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2 class="login-title">🎵 本地音樂播放器</h2>
            <div class="input-group"><label>帳號</label><input type="text" id="username" placeholder="請輸入帳號"></div>
            <div class="input-group"><label>密碼</label><input type="password" id="password" placeholder="請輸入密碼"></div>
            <button class="login-btn" id="loginBtn">登入</button>
            <div class="error-msg" id="errorMsg">帳號或密碼錯誤</div>
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="tab-container">
            <button class="tab-btn active" data-tab="my-songs">🎵 我的歌單</button>
            <button class="tab-btn" data-tab="liked-songs">❤️ 已按讚歌曲</button>
            <button class="tab-btn" data-tab="history">📜 播放記錄</button>
        </div>

        <div class="tab-content active" id="my-songs">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁🎵</div>
                <div class="upload-text">點擊或拖曳 MP3 檔案上傳</div>
                <div class="upload-sub">歌曲會儲存在您的瀏覽器中（IndexedDB）</div>
                <input type="file" id="file-input" accept="audio/mp3,audio/mpeg" multiple>
            </div>
            <div class="storage-info" id="storageInfo">📀 計算儲存空間中...</div>
            <button class="clear-all-btn" id="clearAllBtn" style="display: none;">🗑️ 清空所有歌曲</button>
            <div class="song-list" id="mySongList"></div>
        </div>

        <div class="tab-content" id="liked-songs">
            <div class="song-list" id="likedSongList"></div>
        </div>

        <div class="tab-content" id="history">
            <div class="song-list" id="historyList"></div>
        </div>
    </div>

    <div class="player-bar">
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="time-display time-current" id="timeCurrent">0:00</div>
            <div class="time-display time-total" id="timeTotal">0:00</div>
        </div>
        <div class="player-cover" id="playerCover">🎵</div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">未播放任何歌曲</div>
            <div class="player-artist" id="playerArtist">本地音樂</div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="shuffleBtn">🔀</button>
            <button class="control-btn" id="prevBtn">⏮️</button>
            <button class="control-btn play-pause" id="playPauseBtn">⏸️</button>
            <button class="control-btn" id="nextBtn">⏭️</button>
            <button class="control-btn" id="timerBtn">⏱️</button>
        </div>
    </div>
    <audio id="audioPlayer"></audio>

    <script>
        // 登入驗證
        const VALID_USERNAME = 'lin0525';
        const VALID_PASSWORD = 'aa340993';
        
        const loginContainer = document.getElementById('loginContainer');
        const mainContainer = document.getElementById('mainContainer');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        
        loginBtn.addEventListener('click', () => {
            if (usernameInput.value.trim() === VALID_USERNAME && passwordInput.value.trim() === VALID_PASSWORD) {
                loginContainer.style.opacity = '0';
                setTimeout(() => {
                    loginContainer.style.display = 'none';
                    mainContainer.style.display = 'block';
                    initApp();
                }, 500);
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        });
        
        // ========== IndexedDB 儲存 ==========
        const DB_NAME = 'MusicPlayerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'songs';
        
        let db = null;
        let songList = [];      // 歌曲陣列 { id, name, blob, url, size, date }
        let likedSongs = [];    // 喜歡的歌曲 ID
        let playHistory = [];    // 播放記錄
        let currentSongIndex = -1;
        let isShuffle = false;
        
        // 播放器元素
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeTotal = document.getElementById('timeTotal');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const playerCover = document.getElementById('playerCover');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const timerBtn = document.getElementById('timerBtn');
        const mySongListDiv = document.getElementById('mySongList');
        const likedSongListDiv = document.getElementById('likedSongList');
        const historyListDiv = document.getElementById('historyList');
        const storageInfo = document.getElementById('storageInfo');
        const clearAllBtn = document.getElementById('clearAllBtn');
        
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        // 初始化 IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }
        
        // 儲存歌曲到 IndexedDB
        async function saveSongToDB(song) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(song);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        // 從 IndexedDB 讀取所有歌曲
        async function loadSongsFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    const songs = request.result;
                    // 重新建立 blob URL
                    for (let song of songs) {
                        if (song.blob) {
                            song.url = URL.createObjectURL(song.blob);
                        }
                    }
                    resolve(songs);
                };
                request.onerror = () => reject(request.error);
            });
        }
        
        // 刪除歌曲
        async function deleteSongFromDB(songId) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(songId);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        // 清空所有歌曲
        async function clearAllSongs() {
            if (!confirm('⚠️ 確定要刪除所有歌曲嗎？此操作無法復原！')) return;
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.clear();
            request.onsuccess = () => {
                songList.forEach(song => { if (song.url) URL.revokeObjectURL(song.url); });
                songList = [];
                likedSongs = [];
                playHistory = [];
                localStorage.removeItem('likedSongs_v2');
                localStorage.removeItem('playHistory_v2');
                renderSongList();
                renderLikedSongs();
                renderHistory();
                updateStorageInfo();
                if (audioPlayer.src) { audioPlayer.pause(); audioPlayer.src = ''; playerTitle.textContent = '未播放任何歌曲'; playPauseBtn.textContent = '▶️'; }
                clearAllBtn.style.display = 'none';
            };
        }
        
        // 計算儲存空間
        async function updateStorageInfo() {
            if (!db) return;
            const songs = await loadSongsFromDB();
            const totalSize = songs.reduce((sum, s) => sum + (s.size || 0), 0);
            storageInfo.innerHTML = `💾 已儲存 ${songs.length} 首歌曲，共 ${formatSize(totalSize)}`;
            if (songs.length > 0) clearAllBtn.style.display = 'block';
            else clearAllBtn.style.display = 'none';
        }
        
        // 上傳 MP3 檔案
        async function uploadMP3(file) {
            if (!file.type.includes('audio/mp3') && !file.name.endsWith('.mp3')) {
                alert('請上傳 MP3 檔案');
                return;
            }
            
            const songId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            const blob = file.slice(0, file.size, file.type);
            const url = URL.createObjectURL(blob);
            
            const song = {
                id: songId,
                name: file.name.replace('.mp3', ''),
                blob: blob,
                url: url,
                size: file.size,
                date: new Date().toISOString()
            };
            
            await saveSongToDB(song);
            songList.push(song);
            renderSongList();
            updateStorageInfo();
            
            if (songList.length === 1 && currentSongIndex === -1) {
                playSong(0);
            }
        }
        
        // 播放歌曲
        function playSong(index) {
            if (index < 0 || index >= songList.length) return;
            currentSongIndex = index;
            const song = songList[index];
            audioPlayer.src = song.url;
            audioPlayer.play().catch(e => console.log('播放失敗', e));
            playPauseBtn.textContent = '⏸️';
            playerTitle.textContent = song.name;
            playerArtist.textContent = '本地音樂';
            playerCover.textContent = '🎵';
            
            // 記錄播放歷史
            const historyItem = { id: song.id, name: song.name, time: new Date().toLocaleString('zh-TW') };
            playHistory = [historyItem, ...playHistory.filter(h => h.id !== song.id)].slice(0, 50);
            localStorage.setItem('playHistory_v2', JSON.stringify(playHistory));
            renderHistory();
        }
        
        function playNext() {
            if (songList.length === 0) return;
            let newIndex;
            if (isShuffle) {
                newIndex = Math.floor(Math.random() * songList.length);
            } else {
                newIndex = (currentSongIndex + 1) % songList.length;
            }
            playSong(newIndex);
        }
        
        function playPrev() {
            if (songList.length === 0) return;
            let newIndex;
            if (isShuffle) {
                newIndex = Math.floor(Math.random() * songList.length);
            } else {
                newIndex = (currentSongIndex - 1 + songList.length) % songList.length;
            }
            playSong(newIndex);
        }
        
        // 刪除歌曲
        async function deleteSong(song, idx) {
            if (!confirm(`確定刪除「${song.name}」嗎？`)) return;
            await deleteSongFromDB(song.id);
            if (song.url) URL.revokeObjectURL(song.url);
            songList.splice(idx, 1);
            
            if (currentSongIndex === idx) {
                if (songList.length > 0) playSong(Math.min(idx, songList.length - 1));
                else { audioPlayer.pause(); audioPlayer.src = ''; playerTitle.textContent = '未播放任何歌曲'; playPauseBtn.textContent = '▶️'; }
            } else if (currentSongIndex > idx) {
                currentSongIndex--;
            }
            
            likedSongs = likedSongs.filter(l => l !== song.id);
            localStorage.setItem('likedSongs_v2', JSON.stringify(likedSongs));
            
            renderSongList();
            renderLikedSongs();
            updateStorageInfo();
        }
        
        // 按讚功能
        function toggleLike(songId) {
            if (likedSongs.includes(songId)) {
                likedSongs = likedSongs.filter(id => id !== songId);
            } else {
                likedSongs.push(songId);
            }
            localStorage.setItem('likedSongs_v2', JSON.stringify(likedSongs));
            renderSongList();
            renderLikedSongs();
        }
        
        // 渲染我的歌單
        function renderSongList() {
            mySongListDiv.innerHTML = '';
            if (songList.length === 0) {
                mySongListDiv.innerHTML = '<div class="empty-state">🎧 還沒有歌曲，點擊上方區域上傳 MP3 吧！</div>';
                return;
            }
            
            songList.forEach((song, idx) => {
                const isLiked = likedSongs.includes(song.id);
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div class="song-cover">🎵</div>
                    <div class="song-info">
                        <div class="song-name">${escapeHtml(song.name)}</div>
                        <div class="song-size">${formatSize(song.size)}</div>
                    </div>
                    <button class="like-btn ${isLiked ? 'active' : ''}" data-id="${song.id}">❤️</button>
                    <button class="delete-song-btn" data-id="${song.id}">🗑️</button>
                `;
                const likeBtn = div.querySelector('.like-btn');
                const delBtn = div.querySelector('.delete-song-btn');
                likeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(song.id); });
                delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteSong(song, idx); });
                div.addEventListener('click', () => playSong(idx));
                mySongListDiv.appendChild(div);
            });
        }
        
        // 渲染已按讚歌曲
        function renderLikedSongs() {
            likedSongListDiv.innerHTML = '';
            const likedSongsList = songList.filter(s => likedSongs.includes(s.id));
            if (likedSongsList.length === 0) {
                likedSongListDiv.innerHTML = '<div class="empty-state">❤️ 暫無已按讚歌曲，去我的歌單按讚吧！</div>';
                return;
            }
            likedSongsList.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div class="song-cover">❤️</div>
                    <div class="song-info"><div class="song-name">${escapeHtml(song.name)}</div></div>
                    <button class="like-btn active">❤️</button>
                `;
                const likeBtn = div.querySelector('.like-btn');
                likeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(song.id); });
                div.addEventListener('click', () => { const idx = songList.findIndex(s => s.id === song.id); if (idx !== -1) playSong(idx); });
                likedSongListDiv.appendChild(div);
            });
        }
        
        // 渲染播放記錄
        function renderHistory() {
            historyListDiv.innerHTML = '';
            if (playHistory.length === 0) {
                historyListDiv.innerHTML = '<div class="empty-state">📭 尚無播放記錄</div>';
                return;
            }
            playHistory.slice(0, 30).forEach(item => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div class="song-cover">📜</div>
                    <div class="song-info">
                        <div class="song-name">${escapeHtml(item.name)}</div>
                        <div class="song-duration">${item.time}</div>
                    </div>
                `;
                div.addEventListener('click', () => {
                    const idx = songList.findIndex(s => s.id === item.id);
                    if (idx !== -1) playSong(idx);
                });
                historyListDiv.appendChild(div);
            });
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        // 播放器事件
        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const total = audioPlayer.duration;
            if (total && isFinite(total)) {
                progressBar.style.width = `${(current / total) * 100}%`;
                timeCurrent.textContent = formatTime(current);
                timeTotal.textContent = formatTime(total);
            }
        });
        
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percentage = (e.clientX - rect.left) / rect.width;
            if (audioPlayer.duration && isFinite(audioPlayer.duration)) {
                audioPlayer.currentTime = percentage * audioPlayer.duration;
            }
        });
        
        playPauseBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.textContent = '⏸️';
            } else {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶️';
            }
        });
        
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.style.color = isShuffle ? '#1db954' : '#fff';
        });
        
        timerBtn.addEventListener('click', () => {
            const minutes = prompt('設定定時關閉(分鐘):', '30');
            if (minutes && !isNaN(minutes) && minutes > 0) {
                setTimeout(() => { audioPlayer.pause(); playPauseBtn.textContent = '▶️'; alert(`已自動關閉播放`); }, minutes * 60 * 1000);
                alert(`✅ 已設定 ${minutes} 分鐘後自動關閉`);
            }
        });
        
        nextBtn.addEventListener('click', () => playNext());
        prevBtn.addEventListener('click', () => playPrev());
        audioPlayer.addEventListener('ended', () => playNext());
        
        // 上傳區域
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('file-input');
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = 'rgba(29,185,84,0.2)'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.background = 'transparent');
        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.style.background = 'transparent';
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.includes('audio') || f.name.endsWith('.mp3'));
            for (const file of files) await uploadMP3(file);
        });
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) await uploadMP3(file);
            fileInput.value = '';
        });
        
        clearAllBtn.addEventListener('click', () => clearAllSongs());
        
        // 分頁切換
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(target).classList.add('active');
                if (target === 'history') renderHistory();
                if (target === 'liked-songs') renderLikedSongs();
            });
        });
        
        // 初始化應用程式
        async function initApp() {
            await initDB();
            const songs = await loadSongsFromDB();
            songList = songs;
            likedSongs = JSON.parse(localStorage.getItem('likedSongs_v2') || '[]');
            playHistory = JSON.parse(localStorage.getItem('playHistory_v2') || '[]');
            renderSongList();
            renderLikedSongs();
            renderHistory();
            updateStorageInfo();
        }
    </script>
</body>
</html>
